{{define "dashboard.html"}}<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>egate</title><style>{{template "style"}}</style></head><body><main class="card"><div class="top"><div><h1>egate</h1><span class="muted">API key administration</span></div><form method="post" action="/logout"><input type="hidden" name="csrf" value="{{.CSRF}}"><button>Log out</button></form></div>{{if .NewKey}}<p class="notice">{{.Message}}<code class="key">{{.NewKey}}</code></p>{{end}}<h2>Create API key</h2><form class="create" method="post" action="/keys"><input type="hidden" name="csrf" value="{{.CSRF}}"><label>Name<input name="name" placeholder="production app" required></label><button>Create key</button></form><h2>Active keys</h2>{{if .Keys}}<table><thead><tr><th>Name</th><th>Prefix</th><th>Created (UTC)</th><th></th></tr></thead><tbody>{{range .Keys}}<tr><td>{{.Name}}</td><td><code>{{.Prefix}}…</code></td><td>{{.Created}}</td><td><form class="inline" method="post" action="/keys/{{.ID}}/revoke"><input type="hidden" name="csrf" value="{{$.CSRF}}"><button class="danger">Revoke</button></form></td></tr>{{end}}</tbody></table>{{else}}<p class="muted">No active API keys.</p>{{end}}</main></body></html>{{end}}
